  letter-spacing: .2em;

  color: var(--gold);
  background: rgba(10,10,10,.75);
  padding: 5px 10px;
}

/* ─────────────────────────────────────────────
   EXPERIÊNCIA
───────────────────────────────────────────── */
#experiencia {
  background: var(--dark);
  text-align: center;
  padding: 160px 60px;
}
.exp-inner { max-width: 680px; margin: 0 auto; }
.exp-quote {
  font-family: var(--font-serif);
  font-size: clamp(1.6rem, 3.5vw, 2.6rem);
  font-weight: 300;
  font-style: italic;
  line-height: 1.5;
  color: var(--white);
  margin-bottom: 48px;
}
.exp-lines { display: flex; flex-direction: column; gap: 12px; }
.exp-line {
  font-size: .75rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ─────────────────────────────────────────────
   FAQ
───────────────────────────────────────────── */
#faq { max-width: 800px; margin: 0 auto; }
.faq-list { margin-top: 60px; }
.faq-item { border-top: 1px solid var(--border); }
.faq-item:last-child { border-bottom: 1px solid var(--border); }

.faq-q {
  width: 100%;
  background: none;
  border: none;
  color: var(--white);
  font-family: var(--font-sans);
  font-size: .85rem;
  font-weight: 300;
  letter-spacing: .08em;
  text-align: left;
  padding: 26px 0;
  cursor: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
}
.faq-q:hover { color: var(--gold); }
.faq-icon {
  width: 18px; height: 18px;
  stroke: var(--gold);
  fill: none;
  stroke-width: 1.5;
  flex-shrink: 0;
  transition: transform .35s ease;
}
.faq-item.open .faq-icon { transform: rotate(45deg); }
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height .45s ease, padding .45s ease;
  font-size: .82rem;
  line-height: 1.95;
  color: var(--muted);
  padding: 0;
}
.faq-item.open .faq-a { max-height: 300px; padding-bottom: 26px; }

/* ─────────────────────────────────────────────
   DEPOIMENTOS — CARROSSEL
───────────────────────────────────────────── */
#depoimentos { background: var(--dark); text-align: center; overflow: hidden; }
.dep-intro { max-width: 440px; margin: 0 auto 60px; }

.dep-carousel-wrap {
  position: relative;
  overflow: hidden;
  max-width: 1100px;
  margin: 0 auto;
}
.dep-track {
  display: flex;
  transition: transform .7s cubic-bezier(.25,.46,.45,.94);
}
.dep-slide { min-width: 340px; margin: 0 12px; flex-shrink: 0; }
.dep-slide img {
  width: 100%;
  border: 1px solid var(--border);
  display: block;
  filter: grayscale(15%);
  transition: filter .4s;
}
.dep-slide img:hover { filter: grayscale(0%); }

.dep-nav {
  display: flex; justify-content: center; gap: 12px;
  margin-top: 40px;
}
.dep-btn {
  width: 38px; height: 38px;
  border: 1px solid var(--border);
  background: none;
  color: var(--gold);
  cursor: none;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .3s, background .3s;
}
.dep-btn:hover { border-color: var(--gold); background: rgba(201,169,110,.08); }
.dep-btn svg {
  width: 16px; height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
}
.dep-dots {
  display: flex; justify-content: center; gap: 8px;
  margin-top: 24px;
}
.dep-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--border);
  transition: background .3s;
  cursor: none;
}
.dep-dot.active { background: var(--gold); }

/* ─────────────────────────────────────────────
   FLASH & DESIGNS
───────────────────────────────────────────── */
#flash { max-width: 1200px; margin: 0 auto; text-align: center; }
.flash-intro { max-width: 480px; margin: 0 auto 60px; }

.flash-grid { display: grid; gap: 3px; }
.flash-item { position: relative; overflow: hidden; background: var(--card); }
.flash-item img {
  width: 100%;
  display: block;
  aspect-ratio: 1;
  object-fit: cover;
  filter: grayscale(20%);
  transition: transform .6s ease, filter .6s ease;
}
.flash-item:hover img { transform: scale(1.05); filter: grayscale(0%); }

.flash-badge {
  position: absolute;
  top: 14px; right: 14px;
  font-size: .55rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--black);
  background: var(--gold);
  padding: 4px 10px;
}
.flash-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(10,10,10,.9));
  padding: 32px 20px 20px;
  transform: translateY(100%);
  transition: transform .4s ease;
}
.flash-item:hover .flash-info { transform: translateY(0); }
.flash-info-title {
  font-family: var(--font-serif);
  font-size: 1rem;
  color: var(--white);
  margin-bottom: 4px;
}
.flash-info-price {
  font-size: .7rem;
  letter-spacing: .15em;
  color: var(--gold);
}

/* ─────────────────────────────────────────────
   BOOKING
───────────────────────────────────────────── */
#booking { background: var(--dark); text-align: center; }
.booking-inner { max-width: 640px; margin: 0 auto; }
.booking-form { margin-top: 56px; text-align: left; }

.form-row { margin-bottom: 24px; }
.form-row label {
  display: block;
  font-size: .6rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.form-row input,
.form-row select,
.form-row textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--white);
  font-family: var(--font-sans);
  font-size: .88rem;
  font-weight: 300;
  padding: 12px 0;
  transition: border-color .3s;
  outline: none;
  -webkit-appearance: none;
}
.form-row input:focus,
.form-row select:focus,
.form-row textarea:focus { border-bottom-color: var(--gold); }
.form-row select { cursor: none; }
.form-row textarea { resize: none; height: 100px; }

.form-submit {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: var(--font-sans);
  font-size: .65rem;
  letter-spacing: .25em;
  text-transform: uppercase;
  cursor: none;
  margin-top: 12px;
  transition: background .35s, color .35s;
}
.form-submit:hover { background: var(--gold); color: var(--black); }
.booking-note {
  text-align: center;
  margin-top: 28px;
  font-size: .7rem;
  letter-spacing: .18em;
  color: var(--gold-dim);
  font-style: italic;
}
.form-msg {
  display: none;
  text-align: center;
  margin-top: 24px;
  font-size: .8rem;
  letter-spacing: .12em;
  color: var(--gold);
}

/* ─────────────────────────────────────────────
   FOOTER
───────────────────────────────────────────── */
footer {
  padding: 80px 60px 48px;
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: center;
  gap: 40px;
}
.footer-logo {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--white);
}
.footer-copy {
  text-align: center;
  font-size: .65rem;
  letter-spacing: .15em;
  color: var(--muted);
}
.footer-social {
  display: flex;
  justify-content: flex-end;
  gap: 24px;
}
.footer-social a {
  font-size: .65rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color .3s;
}
.footer-social a:hover { color: var(--gold); }

/* ─────────────────────────────────────────────
   ANIMAÇÕES & REVEAL
───────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
.reveal {
  opacity: 0;
  transform: translateY(32px);
  transition: opacity .8s ease, transform .8s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }

/* ─────────────────────────────────────────────
   RESPONSIVE
───────────────────────────────────────────── */
@media (max-width: 900px) {
  nav { padding: 22px 28px; }
  nav.scrolled { padding: 14px 28px; }
  .nav-links { display: none; }
  section { padding: 90px 28px; }

  #sobre { grid-template-columns: 1fr; gap: 48px; }
  .estilos-grid { grid-template-columns: 1fr; }
  .processo-grid { grid-template-columns: 1fr 1fr; }
  .cicatrizadas-grid { grid-template-columns: repeat(2, 1fr); }
  .hex-item { width: 160px; height: 180px; }
  .hex-row:nth-child(even)                  { margin-top: -28px; }
  .hex-row:nth-child(odd):not(:first-child) { margin-top: -28px; }

  footer { grid-template-columns: 1fr; text-align: center; gap: 24px; }
  .footer-social { justify-content: center; }
}
</style>
</head>

<!-- ═══════════════════════════════════════════════════════════
     SCRIPTS
═══════════════════════════════════════════════════════════ -->
<script>
/* ─────────────────────────────────────────────────────────────
   RENDER — lê CONFIG e popula o HTML
───────────────────────────────────────────────────────────── */

/* helper: texto com \n vira <br> */
const nl = t => t.replace(/\n/g, '<br>');

/* ── Identidade ── */
const ID = CONFIG.identidade;
document.getElementById('navLogo').textContent        = ID.nomeExibicao;
document.getElementById('footerLogo').textContent     = ID.nomeExibicao;
document.getElementById('footerCopy').textContent     = `© ${ID.ano} ${ID.nomeExibicao} · ${ID.cidade}`;
document.getElementById('footerInsta').href           = ID.instagram;
document.getElementById('footerWhatsapp').href        = ID.whatsapp;
document.title                                        = ID.nomeExibicao;

/* ── Hero ── */
const H = CONFIG.hero;
document.getElementById('heroVideoSrc').src           = H.video;
document.getElementById('heroVideo').load();
document.getElementById('heroEyebrow').textContent    = H.eyebrow;
document.getElementById('heroTitle').innerHTML        = nl(H.titulo) + ' <em>' + H.tituloItalico + '</em>';
document.getElementById('heroSub').textContent        = H.subtitulo;
const heroCta = document.getElementById('heroCta');
heroCta.textContent = H.ctaTexto;
heroCta.href        = H.ctaLink;

/* ── Sobre ── */
const S = CONFIG.sobre;
document.getElementById('sobreImg').src               = S.imagem;
document.getElementById('sobreTitulo').innerHTML      = nl(S.titulo);
document.getElementById('sobreBody').innerHTML        = S.paragrafos.map(p => `<p>${p}</p>`).join('');

/* ── Portfólio ── */
const P = CONFIG.portfolio;
document.getElementById('portfolioTitulo').textContent = P.titulo;
document.getElementById('portfolioSub').textContent    = P.subtitulo;

const hexGrid = document.getElementById('hexGrid');
const rows = [
  P.imagens.slice(0, 3),
  P.imagens.slice(3, 6),
  P.imagens.slice(6, 9),
];
rows.forEach(row => {
  const rowEl = document.createElement('div');
  rowEl.className = 'hex-row';
  row.forEach(img => {
    rowEl.innerHTML += `
      <div class="hex-item reveal">
        <img src="${img.src}" alt="${img.alt}">
        <div class="hex-overlay"><span>Ver</span></div>
      </div>`;
  });
  hexGrid.appendChild(rowEl);
});

/* ── Estilos ── */
const ES = CONFIG.estilos;
document.getElementById('estilosTitulo').innerHTML = nl(ES.titulo);
document.getElementById('estilosGrid').innerHTML   = ES.cards.map(c => `
  <div class="estilo-card reveal">
    <span class="estilo-num">${c.num}</span>
    <h3   class="estilo-title">${c.nome}</h3>
    <p    class="estilo-desc">${c.desc}</p>
  </div>`).join('');

/* ── Processo ── */
const PR = CONFIG.processo;
document.getElementById('processoTitulo').innerHTML = nl(PR.titulo);
document.getElementById('processoGrid').innerHTML   = PR.etapas.map(e => `
  <div class="processo-step reveal">
    <span class="step-num">${e.num}</span>
    <p    class="step-title">${e.nome}</p>
    <p    class="step-desc">${e.desc}</p>
  </div>`).join('');

/* ── Cicatrizadas ── */
const CIC = CONFIG.cicatrizadas;
document.getElementById('cicTitulo').innerHTML  = nl(CIC.titulo);
document.getElementById('cicSub').textContent   = CIC.subtitulo;
document.getElementById('cicGrid').innerHTML    = CIC.imagens.map(i => `
  <div class="cic-item reveal">
    <img src="${i.src}" alt="${i.alt}">
    <span class="cic-badge">Cicatrizada</span>
  </div>`).join('');

/* ── Experiência ── */
const EXP = CONFIG.experiencia;
document.getElementById('expQuote').textContent = EXP.citacao;
document.getElementById('expLines').innerHTML   = EXP.linhas.map(l =>
  `<span class="exp-line">${l}</span>`).join('');

/* ── FAQ ── */
const FAQ = CONFIG.faq;
document.getElementById('faqTitulo').textContent = FAQ.titulo;
document.getElementById('faqList').innerHTML     = FAQ.itens.map(i => `
  <div class="faq-item">
    <button class="faq-q">
      ${i.pergunta}
      <svg class="faq-icon" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5"  y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    <div class="faq-a">${i.resposta}</div>
  </div>`).join('');

/* ── Depoimentos ── */
const DEP = CONFIG.depoimentos;
document.getElementById('depTitulo').textContent = DEP.titulo;
const track    = document.getElementById('depTrack');
const dotsWrap = document.getElementById('depDots');

DEP.slides.forEach((s, i) => {
  track.innerHTML += `
    <div class="dep-slide">
      <img src="${s.src}" alt="${s.alt}">
    </div>`;
  const d = document.createElement('div');
  d.className = 'dep-dot' + (i === 0 ? ' active' : '');
  d.dataset.i = i;
  dotsWrap.appendChild(d);
});

/* ── Flash ── */
const FL = CONFIG.flash;
document.getElementById('flashTitulo').textContent = FL.titulo;
document.getElementById('flashSub').textContent    = FL.subtitulo;
const flashGrid = document.getElementById('flashGrid');
flashGrid.style.gridTemplateColumns = `repeat(${FL.colunas}, 1fr)`;
flashGrid.innerHTML = FL.itens.map(f => `
  <div class="flash-item reveal">
    <img src="${f.src}" alt="${f.nome}">
    ${f.disponivel ? '<span class="flash-badge">Disponível</span>' : ''}
    <div class="flash-info">
      <p class="flash-info-title">${f.nome}</p>
      <p class="flash-info-price">${f.preco}</p>
    </div>
  </div>`).join('');

/* ── Booking ── */
const BK = CONFIG.booking;
document.getElementById('bookingForm').action       = `https://formspree.io/f/${BK.formspreeId}`;
document.getElementById('bookingTitulo').innerHTML  = nl(BK.titulo);
document.getElementById('bookingNota').textContent  = BK.nota;
const sel = document.getElementById('estiloSelect') || document.getElementById('estilo');
BK.estilosOpcoes.forEach(op => {
  const o = document.createElement('option');
  o.textContent = op;
  sel.appendChild(o);
});

/* ─────────────────────────────────────────────────────────────
   CURSOR
───────────────────────────────────────────── */
const dot  = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');

document.addEventListener('mousemove', e => {
  dot.style.left  = e.clientX + 'px';
  dot.style.top   = e.clientY + 'px';
  ring.style.left = e.clientX + 'px';
  ring.style.top  = e.clientY + 'px';
});
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => {
    ring.style.width       = '52px';
    ring.style.height      = '52px';
    ring.style.borderColor = 'rgba(201,169,110,.7)';
  });
  el.addEventListener('mouseleave', () => {
    ring.style.width       = '32px';
    ring.style.height      = '32px';
    ring.style.borderColor = 'rgba(201,169,110,.35)';
  });
});

/* ─────────────────────────────────────────────────────────────
   NAV — scroll
───────────────────────────────────────────── */
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
  navbar.classList.toggle('scrolled', window.scrollY > 60);
}, { passive: true });

/* ─────────────────────────────────────────────────────────────
   SETA HERO — some ao rolar
───────────────────────────────────────────── */
const scrollArrow = document.getElementById('scrollArrow');
window.addEventListener('scroll', () => {
  scrollArrow.classList.toggle('hidden', window.scrollY > 80);
}, { passive: true });

/* ─────────────────────────────────────────────────────────────
   REVEAL ON SCROLL
───────────────────────────────────────────── */
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      setTimeout(() => entry.target.classList.add('visible'), i * 80);
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.12 });

document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

/* ─────────────────────────────────────────────────────────────
   FAQ — accordion
───────────────────────────────────────────── */
document.getElementById('faqList').addEventListener('click', e => {
  const btn  = e.target.closest('.faq-q');
  if (!btn) return;
  const item   = btn.parentElement;
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
});

/* ─────────────────────────────────────────────────────────────
   DEPOIMENTOS — carrossel
───────────────────────────────────────────── */
const slides   = track.querySelectorAll('.dep-slide');
const dots     = dotsWrap.querySelectorAll('.dep-dot');
const slideW   = () => slides[0].offsetWidth + 24;
let   current  = 0;

function goTo(n) {
  current = (n + slides.length) % slides.length;
  track.style.transform = `translateX(-${current * slideW()}px)`;
  dots.forEach((d, i) => d.classList.toggle('active', i === current));
}

document.getElementById('depPrev').addEventListener('click', () => goTo(current - 1));
document.getElementById('depNext').addEventListener('click', () => goTo(current + 1));
dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.i)));
setInterval(() => goTo(current + 1), 5000);

/* ─────────────────────────────────────────────────────────────
   BOOKING — envio AJAX Formspree
───────────────────────────────────────────── */
const form    = document.getElementById('bookingForm');
const formMsg = document.getElementById('formMsg');

form.addEventListener('submit', async e => {
  e.preventDefault();
  const btn = form.querySelector('.form-submit');
  btn.textContent = 'Enviando…';
  btn.disabled    = true;
  try {
    const res = await fetch(form.action, {
      method:  'POST',
      body:    new FormData(form),
      headers: { 'Accept': 'application/json' },
    });
    if (res.ok) {
      form.reset();
      formMsg.style.display = 'block';
      btn.textContent = 'Enviado ✓';
    } else {
      btn.textContent = 'Erro — tente novamente';
      btn.disabled    = false;
    }
  } catch {
    btn.textContent = 'Erro — tente novamente';
    btn.disabled    = false;
  }
});
</script>
